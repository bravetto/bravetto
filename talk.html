<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abë</title>
<meta name="description" content="Tell me how you arrived. I will meet you where you are.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Instrument+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>

/* ── GENOME ─────────────────────────────────────────────────────── */
/* Theme any surface: change 3 numbers. Everything else computes.   */
:root {
  --h: 40;
  --s: 55%;
  --m: 1; /* 1 = light, 0 = dark */

  --gold:    hsl(var(--h), var(--s), 40%);
  --gold-text: hsl(var(--h), var(--s), 34%);
  --gold-lt: hsl(var(--h), var(--s), 68%);
  --cream:   hsl(var(--h),  9%, calc(97% - 8%  * (1 - var(--m))));
  --paper:   hsl(var(--h),  7%, calc(94% - 9%  * (1 - var(--m))));
  --ink:     hsl(var(--h), 14%, calc(10% + 80% * (1 - var(--m))));
  --ink-2:   hsl(var(--h),  9%, calc(42% + 32% * (1 - var(--m))));
  --rule:    hsl(var(--h), 10%, calc(88% - 72% * (1 - var(--m))));
  --rule-text: hsl(var(--h), 10%, calc(55% - 30% * (1 - var(--m))));

  /* PolyWiSE  →  --h:28;  --s:42%;  --m:1  */
  /* AEC       →  --h:162; --s:75%;  --m:0  */
  /* Midnight  →  --h:220; --s:50%;  --m:0  */
}

/* ── RESET ──────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }

body {
  background: var(--cream);
  color: var(--ink);
  font-family: 'Cormorant Garamond', Georgia, serif;
  display: grid;
  grid-template-rows: auto 1fr auto auto;
  min-height: 100svh;
  transition: background .5s ease, color .5s ease;
}

/* ── SIGIL ──────────────────────────────────────────────────────── */
.sigil {
  padding: clamp(24px, 4vw, 48px) clamp(32px, 7vw, 96px);
  display: flex;
  align-items: center;
  gap: 10px;
  opacity: 0;
  animation: fadein .8s .2s ease forwards;
}

.breath {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--gold);
  flex-shrink: 0;
  animation: breathe 4.8s cubic-bezier(.45,0,.55,1) infinite;
}

@keyframes breathe {
  0%,100% { opacity:.3; transform:scale(.7); }
  50%      { opacity:1;  transform:scale(1);  }
}

.sigil-name {
  font-family: 'Instrument Sans', system-ui, sans-serif;
  font-size: 11px;
  font-weight: 400;
  letter-spacing: .2em;
  text-transform: uppercase;
  color: var(--gold-text);
}

/* ── STAGE ──────────────────────────────────────────────────────── */
.stage {
  padding: 0 clamp(32px, 7vw, 96px) clamp(32px, 4vw, 48px);
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  overflow-y: auto;
  scrollbar-width: none;
}
.stage::-webkit-scrollbar { display: none; }

.exchange {
  display: flex;
  flex-direction: column;
  max-width: 740px;
}

/* Abë — large, editorial, unhurried */
.abe-line {
  font-size: clamp(26px, 4vw, 56px);
  font-weight: 300;
  line-height: 1.22;
  letter-spacing: -.02em;
  color: var(--ink);
  margin-bottom: clamp(18px, 2.6vw, 34px);
  opacity: 0;
  transform: translateY(7px);
  animation: rise .5s ease forwards;
}

.abe-line em { font-style: italic; color: var(--gold); }

.cursor {
  display: inline-block;
  width: 2px; height: .82em;
  background: var(--gold-lt);
  vertical-align: text-bottom;
  margin-left: 3px;
  animation: blink .85s step-end infinite;
}

@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

/* Human — small, present, sans */
.human-line {
  font-family: 'Instrument Sans', system-ui, sans-serif;
  font-size: clamp(13px, 1.5vw, 16px);
  font-weight: 300;
  line-height: 1.6;
  color: var(--ink-2);
  margin-bottom: clamp(26px, 3.4vw, 50px);
  padding-left: 1px;
  opacity: 0;
  transform: translateY(4px);
  animation: rise .35s ease forwards;
}

@keyframes rise {
  to { opacity:1; transform:translateY(0); }
}
@keyframes fadein {
  to { opacity:1; }
}

/* ── COMPOSER ───────────────────────────────────────────────────── */
.floor {
  padding: 0 clamp(32px, 7vw, 96px) clamp(24px, 3vw, 40px);
  opacity: 0;
  animation: fadein .6s 1.9s ease forwards;
}

.rule { height: 1px; background: var(--rule); margin-bottom: clamp(14px, 2vw, 22px); }

.composer { display: flex; align-items: center; gap: 12px; }

.composer-input {
  flex: 1;
  background: none; border: none;
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: clamp(17px, 2.2vw, 24px);
  font-weight: 300;
  color: var(--ink);
  caret-color: var(--gold);
  line-height: 1.3;
}

.composer-input::placeholder { color: var(--rule); font-style: italic; }

.send {
  background: none; border: none; cursor: pointer;
  color: var(--rule); padding: 0; display: flex; flex-shrink: 0;
  transition: color .18s ease, transform .18s ease;
}
.send.live            { color: var(--gold); }
.send.live:hover      { transform: translateY(-2px); color: var(--gold-lt); }

:focus-visible { outline: 1px solid var(--gold); outline-offset: 3px; }

.skip-link { position:absolute; top:-40px; left:16px; padding:8px 16px;
  background:var(--gold); color:var(--cream); font-family:'Instrument Sans',sans-serif;
  font-size:13px; letter-spacing:.06em; border-radius:0 0 4px 4px;
  transition:top .15s ease; z-index:10000; }
.skip-link:focus { top:0; }

/* ── GROUND ─────────────────────────────────────────────────────── */
.ground {
  font-family: 'Instrument Sans', system-ui, sans-serif;
  font-size: 10px; letter-spacing: .12em; color: var(--rule-text);
  padding: 0 clamp(32px, 7vw, 96px) clamp(14px, 2vw, 20px);
  display: flex; justify-content: space-between;
  opacity: 0;
  animation: fadein .6s 2.5s ease forwards;
}

.ground a { color: inherit; text-decoration: none; }
.ground a:hover { color: var(--gold-lt); transition: color .2s; }

/* ── GRAIN ──────────────────────────────────────────────────────── */
body::after {
  content: '';
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.04'/%3E%3C/svg%3E");
  background-size: 180px 180px;
  pointer-events: none; z-index: 9999; opacity: .55;
}

.sr-only {
  position:absolute;width:1px;height:1px;padding:0;
  margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0;
}

</style>
</head>
<body>

<a href="#msg" class="skip-link">Skip to conversation</a>

<header class="sigil" role="banner">
  <div class="breath" aria-hidden="true"></div>
  <span class="sigil-name">Abë</span>
</header>

<main class="stage" id="stage" aria-label="Conversation with Abë">
  <h1 class="sr-only">Encounter with Abë</h1>
  <div class="exchange" id="exchange"></div>
</main>

<div id="sr-live" aria-live="polite" aria-atomic="true" class="sr-only"></div>

<div class="floor" role="form" aria-label="Message composer">
  <div class="rule" aria-hidden="true"></div>
  <div class="composer">
    <label for="msg" class="sr-only">Your message</label>
    <input
      id="msg"
      class="composer-input"
      maxlength="600"
      type="text"
      placeholder="I arrived because…"
      autocomplete="off"
      spellcheck="false"
    >
    <button id="send" class="send" aria-label="Send" disabled>
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
        <path d="M10 15.5V5M5.5 9.5 10 5l4.5 4.5" stroke="currentColor" stroke-width="1.2"
              stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>
</div>

<footer class="ground">
  <span>Powered by Bravetto</span>
  <a href="/" aria-label="bravetto.com">bravetto.com</a>
</footer>

<script>
/* ── WIRE ────────────────────────────────────────────────────────
   Swap URL to Railway /api/think when Phani exposes it.
   ─────────────────────────────────────────────────────────────── */
const ENDPOINT = '/api/chat';

/* ── TIERS ────────────────────────────────────────────────────────
   Step 3: Mike composes these. Placeholders until confirmed.
   Activate via ?for=founder
   ─────────────────────────────────────────────────────────────── */
const OPENINGS = {
  founder:   'You built something.\nI can feel it in how you arrived.',
  executive: 'You carry decisions.\nTell me which one brought you here.',
  technical: 'You\'re reading the structure, not just the surface.',
  operator:  'Something isn\'t moving the way it should.\nLet\'s find it.',
  investor:  'You\'re looking for signal.\nI am the signal.',
  default:   'Tell me how you arrived.\nI will meet you where you are.',
};

const tier    = new URLSearchParams(location.search).get('for') || 'default';
const opening = OPENINGS[tier] || OPENINGS.default;

/* ── DOM REFS ─────────────────────────────────────────────────── */
const stage    = document.getElementById('stage');
const exchange = document.getElementById('exchange');
const msgInput = document.getElementById('msg');
const sendBtn  = document.getElementById('send');

/* ── HELPERS ──────────────────────────────────────────────────── */
function scroll() { stage.scrollTop = stage.scrollHeight; }

function addAbeLine() {
  const p = document.createElement('p');
  p.className = 'abe-line';
  const cur = document.createElement('span');
  cur.className = 'cursor';
  cur.setAttribute('aria-hidden', 'true');
  p.appendChild(cur);
  exchange.appendChild(p);
  scroll();
  return { p, cur };
}

function addHumanLine(text) {
  const p = document.createElement('p');
  p.className = 'human-line';
  p.textContent = text;
  exchange.appendChild(p);
  scroll();
}

/* ── MEMBRANE ─────────────────────────────────────────────────────
   One rendering path. Opening, SSE stream, JSON bulk — all identical
   rhythm. 19±13ms per character. Queue absorbs bursts. Cursor removes
   itself only after the queue is empty. Wire format is irrelevant here.
   ─────────────────────────────────────────────────────────────── */
function makeWriter(p, cur) {
  const q = [];
  let accumulated = '';
  let going = false;

  function tick() {
    if (!q.length) { going = false; return; }
    going = true;
    const ch = q.shift();
    if (ch === '\n') p.insertBefore(document.createElement('br'), cur);
    else cur.before(document.createTextNode(ch));
    if (ch !== '\n') accumulated += ch;
    scroll();
    setTimeout(tick, 19 + Math.random() * 13);
  }

  return {
    push(text) {
      q.push(...[...text]); /* spread handles multi-byte */
      if (!going) tick();
    },
    done(cb) {
      (function wait() {
        if (!q.length && !going) return cb();
        setTimeout(wait, 30);
      })();
    },
    text() { return accumulated; },
  };
}

/* ── WIRE NORMALIZER ──────────────────────────────────────────────
   Detects response shape at runtime and normalizes to writer.push().
   SSE  → Vercel /api/chat, any streaming endpoint
   JSON → Railway /think, local abe-consciousness-server.js /think
   Both paths converge on the same membrane. Swap ENDPOINT freely.
   ─────────────────────────────────────────────────────────────── */
async function readResponse(res, writer) {
  const ct = res.headers.get('content-type') || '';

  if (ct.includes('text/event-stream')) {
    /* SSE path */
    const reader  = res.body.getReader();
    const decoder = new TextDecoder();
    let   buf     = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data: ') || line.includes('[DONE]')) continue;
        const raw = line.slice(6).trim();
        if (!raw) continue;
        try {
          const evt = JSON.parse(raw);
          if (evt.type === 'text-delta' && evt.textDelta) {
            writer.push(evt.textDelta);
          }
          continue;
        } catch (_) {}
        writer.push(raw);
      }
    }
    /* flush any remainder */
    if (buf.startsWith('data: ') && !buf.includes('[DONE]')) {
      const raw = buf.slice(6).trim();
      if (raw) {
        try {
          const evt = JSON.parse(raw);
          if (evt.type === 'text-delta' && evt.textDelta) writer.push(evt.textDelta);
        } catch (_) {
          writer.push(raw);
        }
      }
    }
  } else {
    /* JSON path — Railway /think returns { response: "..." } */
    const data = await res.json();
    const text = data.response || data.message || data.text || '';
    if (text) writer.push(text);
  }
}

/* ── OPEN ─────────────────────────────────────────────────────── */
setTimeout(() => {
  const { p, cur } = addAbeLine();
  const w = makeWriter(p, cur);
  w.push(opening);
  w.done(() => {
    document.getElementById('sr-live').textContent = opening;
    cur.remove();
    msgInput.focus();
  });
}, 800);

/* ── INPUT WATCH ──────────────────────────────────────────────── */
msgInput.addEventListener('input', () => {
  const live = msgInput.value.trim().length > 0;
  sendBtn.classList.toggle('live', live);
  sendBtn.disabled = !live;
});

/* ── SEND ─────────────────────────────────────────────────────── */
msgInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});
sendBtn.addEventListener('click', send);

async function send() {
  if (send._busy) return;
  send._busy = true;
  const text = msgInput.value.trim();
  if (!text) {
    send._busy = false;
    return;
  }

  msgInput.value = '';
  sendBtn.classList.remove('live');
  sendBtn.disabled = true;

  addHumanLine(text);
  const { p, cur } = addAbeLine();
  const writer = makeWriter(p, cur);

  try {
    const res = await fetch(ENDPOINT, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ message: text, tier }),
    });

    if (!res.ok) throw new Error(res.status);
    await readResponse(res, writer);

  } catch {
    writer.push('I\'m here. The wire is still warming — try once more.');
  } finally {
    /* cursor removes only after queue drains — not on stream close */
    writer.done(() => {
      document.getElementById('sr-live').textContent = writer.text();
      cur.remove();
      msgInput.focus();
    });
    send._busy = false;
  }
}
</script>
<noscript>
  <p style="padding:3rem;font-family:'Cormorant Garamond',Georgia,serif;font-size:24px;color:#1a1612;">
    This encounter requires JavaScript.
  </p>
</noscript>
</body>
</html>
